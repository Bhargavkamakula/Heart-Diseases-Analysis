<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clinical specification Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <a href="/" class="logo">Heart<span>Insight</span></a>
        <nav>
            <a href="/">Home</a>
            <a href="/dashboard">Visual Dashboards</a>
            <a href="/story">Analysis Story</a>
            <a href="/brands">Brands Matrix</a>
        </nav>
    </header>

    <section class="container" style="margin-top: 100px;">
        <div class="dashboard-card">
            <h3 id="brand-title">Clinical Provider Specification Profile</h3>
            <p style="font-size: 16px; margin-top: 20px;">
                This workspace aggregates compliance tracking metrics, behavioral dependency matrices, and integration hardware logs for selected diagnostic pipelines.
            </p>
            <a href="/brands" class="btn-get-started" style="display: inline-block; margin-left: 0; margin-top: 20px;">&larr; Return to Brands Matrix</a>
        </div>
    </section>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const vendor = urlParams.get('vendor');
        if (vendor) {
            document.getElementById('brand-title').innerText = "Brand Profile: " + vendor.replace('-', ' ').toUpperCase();
        }
    </script>
</body>
</html>
